site_name: Daiver's blog
site_url: https://JL-Zhao.github.io/
site_author: Daiver
repo_url: https://github.com/JL-Zhao/JL-Zhao.github.io.git
repo_name: Daiver's blog

theme:
  name: material
  custom_dir: custom_dir/
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
    - navigation.tracking
    - navigation.indexes
  palette:
    - scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
      primary: blue grey
      accent: deep orange
    - scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode
      primary: black
      accent: lime
  language: "zh"
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - pymdownx.tilde
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - statistics:
      words_per_minute: 150

extra_css:
  - https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.1.0/style.css
  - ./stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav: 
  - 主页: index.md
  - 人工智能:
    - 模型:
      - AI/model/index.md
      - Qwen2.5-VL: AI/model/Qwen2.5-VL.md
    - 强化学习:
      - AI/rl/index.md
      - 使用 TRL 库对 Qwen2.5-VL 进行 GRPO: AI/rl/practice/grpo_qwen2.5vl.md
    - AI Infra:
      - AI/infra/index.md
      - SPTD 并行: AI/infra/SPTD并行.md



